<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tools | CalcSuit</title>
    <meta name="description" content="Explore the absolute full catalog of calculators and productivity tools meticulously engineered within the CalcSuit ecosystem.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-200 min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Global Nav Appears Here Automatically via layout.js -->
    <div id="sidebar-container" class="contents"></div>

    <main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20 flex flex-col">
        
        <div class="max-w-3xl mb-16">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-6 tracking-tight">
                Global <span class="text-indigo-600 dark:text-indigo-400">Toolkit</span>
            </h1>
            <p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 leading-relaxed font-medium">
                The massive centralized directory of every single application, mathematical algorithm, and operational utility actively running within the enterprise-level CalcSuit ecosystem.
            </p>
        </div>

        <!-- Dynamic Injection Target for the layout.js window config -->
        <div id="dynamic-tools-container" class="space-y-16">
            <!-- Loading State before script fires -->
            <div class="text-slate-400 text-center py-20 animate-pulse font-semibold">
                <i class="fas fa-circle-notch fa-spin text-2xl mb-4"></i><br>
                Compiling tool indexes...
            </div>
        </div>

    </main>

    <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pt-16 pb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center">
            <div class="flex items-center gap-2 mb-6 cursor-pointer">
                <i class="fas fa-calculator text-indigo-600 dark:text-indigo-400 text-lg"></i>
                <span class="text-xl font-bold text-slate-900 dark:text-white">CalcSuit</span>
            </div>
            <div class="text-slate-400 text-sm font-medium">
                &copy; <script>document.write(new Date().getFullYear())</script> CalcSuit Enterprise.
            </div>
        </div>
    </footer>

    <!-- Core App Router -->
    <script src="js/layout.js"></script>
    
    <!-- Render the Grid from the Config -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('dynamic-tools-container');
            
            // Poll for config since layout.js attaches it dynamically
            const checkConfig = setInterval(() => {
                if(window.calculatorConfig) {
                    clearInterval(checkConfig);
                    renderGrid();
                }
            }, 50);

            function renderGrid() {
                const config = window.calculatorConfig.filter(c => c.id !== '/'); // Filter out Dashboard
                const categories = [...new Set(config.map(c => c.category))];
                let htmlPayload = '';
                
                categories.forEach(cat => {
                    const items = config.filter(c => c.category === cat);
                    
                    htmlPayload += `
                        <div class="border-t border-slate-200 dark:border-slate-800/60 pt-8 mt-12 first:mt-0 first:border-0 first:pt-0">
                            <div class="flex items-center gap-4 mb-8">
                                <h2 class="text-3xl font-bold text-slate-800 dark:text-slate-100">${cat} Apps</h2>
                                <div class="h-px bg-slate-200 dark:bg-slate-800 flex-1"></div>
                                <span class="text-sm font-bold text-slate-400 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full border border-slate-200 dark:border-slate-700">${items.length} Modules</span>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                ${items.map(c => {
                                    const localHref = window.rootPrefix + c.id.replace(/^\//, '');
                                    return `
                                        <a href="${localHref}" class="group relative flex items-center p-5 bg-white dark:bg-slate-800 rounded-2xl shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all duration-300 border border-slate-200 dark:border-slate-700 overflow-hidden">
                                            <div class="absolute inset-0 bg-gradient-to-r from-transparent to-indigo-50 dark:to-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                            
                                            <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-slate-50 dark:bg-slate-900 shrink-0 ${c.colorClass} text-xl shadow-inner border border-slate-100 dark:border-slate-800 mr-4 z-10 transition-transform group-hover:scale-110 duration-300">
                                                ${c.icon}
                                            </div>
                                            <div class="z-10 flex-1 min-w-0">
                                                <h3 class="text-base font-bold text-slate-800 dark:text-slate-200 truncate group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">${c.name}</h3>
                                                <p class="text-xs text-slate-500 font-medium uppercase tracking-wider mt-1 select-none">App Module</p>
                                            </div>
                                            <div class="z-10 text-slate-300 dark:text-slate-600 group-hover:text-indigo-500 group-hover:translate-x-1 transition-all">
                                                <i class="fas fa-chevron-right text-sm"></i>
                                            </div>
                                        </a>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                });
                
                setTimeout(() => {
                    container.innerHTML = htmlPayload;
                }, 100);
            }
        });
    </script>

</body>
</html>
