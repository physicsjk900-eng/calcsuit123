<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator | CalcSuite</title>
    <meta name="description" content="Free online basic calculator for standard arithmetic operations.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
                        indigo: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' },
                        emerald: { 400: '#34d399', 500: '#10b981', 600: '#059669' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <!-- Adjust path for calculators/ directory -->
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-mesh text-slate-800 dark:text-slate-200 transition-colors duration-500 min-h-screen flex flex-col p-4 sm:p-6 lg:p-8 relative overflow-x-hidden">

    <div id="toast" class="fixed top-6 right-6 bg-emerald-500 text-white px-5 py-3 rounded-xl shadow-2xl transform transition-transform duration-300 translate-x-[200%] flex items-center gap-3 z-50 font-medium">
        <i class="fas fa-check-circle text-xl"></i><span>Copied to clipboard!</span>
    </div>

    <div id="app-container" class="m-auto glass-panel w-full max-w-5xl rounded-3xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.2)] overflow-hidden flex flex-col md:flex-row min-h-[650px] relative z-10 transition-all duration-300">

        <div id="sidebar-container" class="contents"></div>

        <main class="flex-1 p-6 md:p-10 lg:p-12 relative overflow-y-auto bg-white/10 dark:bg-slate-900/10 backdrop-blur-md">
            
            <div id="calc-basic" class="calculator-view active h-full flex flex-col transition-opacity duration-300">
                <div class="mb-6 flex items-center justify-between">
                    <h2 class="text-3xl font-light tracking-tight">Basic Calc</h2>
                </div>

                <div class="max-w-sm mx-auto w-full flex-1 flex flex-col justify-center">
                    <div class="glass-display rounded-3xl p-6 mb-8 text-right relative min-h-[140px] flex flex-col justify-end group">
                        <button class="copy-trigger absolute top-4 right-4 text-slate-400 hover:text-indigo-500 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100" data-target="basic-display" aria-label="Copy result" title="Copy result">
                            <i class="fas fa-copy text-lg"></i>
                        </button>
                        <div id="basic-history" class="text-sm font-medium text-slate-400 dark:text-slate-500 h-6 tracking-wide mb-1"></div>
                        <div id="basic-display" class="text-5xl font-semibold tracking-wider overflow-x-auto overflow-y-hidden hide-scrollbar">0</div>
                    </div>

                    <div class="grid grid-cols-4 gap-3 sm:gap-4">
                        <button class="calc-btn btn-action font-semibold text-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-500/10" data-action="clear">AC</button>
                        <button class="calc-btn btn-action text-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-500/10" data-action="backspace"><i class="fas fa-backspace"></i></button>
                        <button class="calc-btn btn-action text-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-500/10" data-action="percentage">%</button>
                        <button class="calc-btn btn-operator text-2xl" data-action="divide">÷</button>

                        <button class="calc-btn btn-number" data-value="7">7</button>
                        <button class="calc-btn btn-number" data-value="8">8</button>
                        <button class="calc-btn btn-number" data-value="9">9</button>
                        <button class="calc-btn btn-operator text-2xl" data-action="multiply">×</button>

                        <button class="calc-btn btn-number" data-value="4">4</button>
                        <button class="calc-btn btn-number" data-value="5">5</button>
                        <button class="calc-btn btn-number" data-value="6">6</button>
                        <button class="calc-btn btn-operator text-2xl" data-action="subtract">-</button>

                        <button class="calc-btn btn-number" data-value="1">1</button>
                        <button class="calc-btn btn-number" data-value="2">2</button>
                        <button class="calc-btn btn-number" data-value="3">3</button>
                        <button class="calc-btn btn-operator text-2xl" data-action="add">+</button>

                        <button class="calc-btn btn-number col-span-2" data-value="0">0</button>
                        <button class="calc-btn btn-action text-2xl" data-action="decimal">.</button>
                        <button class="calc-btn btn-equals bg-indigo-500 text-white hover:bg-indigo-600 dark:bg-indigo-600 dark:hover:bg-indigo-500 shadow-lg shadow-indigo-500/30 text-2xl border-none" data-action="calculate">=</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Core Layout injection -->
    <script src="../js/layout.js"></script>
    <script src="../js/calculators/core.js"></script>
    <script src="../js/calculators/basic.js"></script>
</body>
</html>
