<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore the Suite | CalcSuit - 95+ Professional Tools</title>
    <meta name="description"
        content="Browse our complete collection of 95+ professional online calculators, converters, and productivity tools.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
                        indigo: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col font-sans transition-colors duration-200">

    <!-- Header (Navigation) -->
    <div id="sidebar-container" class="contents"></div>

    <main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

        <!-- Hero Title -->
        <div class="text-center mb-20">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-6">
                Professional <span class="text-indigo-600 dark:text-indigo-400">Calculator Suite</span>
            </h1>
            <p class="text-xl text-slate-500 dark:text-slate-400 max-w-2xl mx-auto">
                Discover our complete range of high-precision tools designed for math, finance, and daily productivity.
            </p>
        </div>

        <!-- Dynamic Registry Area -->
        <div id="dir-registry" class="space-y-24">
             <!-- JS will populate categories and tools here based on calculatorConfig -->
        </div>

    </main>

    <!-- Initialize Core Scripts -->
    <script src="js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registry = document.getElementById('dir-registry');
            
            // Wait for calculatorConfig from layout.js
            setTimeout(() => {
                const config = window.calculatorConfig || [];
                renderRegistry(config);
            }, 500);

            function renderRegistry(tools) {
                registry.innerHTML = '';
                const cats = [...new Set(tools.map(t => t.category))].sort();

                cats.forEach(cat => {
                    const catTools = tools.filter(t => t.category === cat);
                    if (catTools.length === 0) return;

                    const sec = document.createElement('section');
                    sec.classList.add('space-y-10', 'mb-20');
                    sec.innerHTML = `
                        <div class="flex items-center gap-4 border-b border-slate-200 dark:border-slate-800 pb-4">
                            <h2 class="text-sm font-black uppercase tracking-[0.4em] text-slate-400 whitespace-nowrap">${cat} Registry</h2>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                            ${catTools.map(t => `
                                <a href="${(window.rootPrefix || '') + (t.id === '/' ? 'index.html' : t.id.replace(/^\//, ''))}" class="p-6 bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 hover:border-indigo-500 transition-all group">
                                    <div class="text-slate-400 group-hover:text-indigo-500 transition-colors mb-3">${t.icon || '<i class="fas fa-calculator"></i>'}</div>
                                    <h4 class="text-sm font-bold text-slate-900 dark:text-white leading-tight">${t.name}</h4>
                                </a>
                            `).join('')}
                        </div>
                    `;
                    registry.appendChild(sec);
                });
            }
        });
    </script>
</body>
</html>
